<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Web Data Studio</title>
  <link rel="stylesheet" href="assets/sidepanel.css" />
</head>
<body>
  <div class="wds-app">
    <header class="wds-header">
      <h1>Web Data Studio</h1>
      <div class="wds-header-actions">
        <button id="btn-rescan" class="wds-btn wds-btn-sm">Rescan</button>
        <button id="btn-pick" class="wds-btn wds-btn-sm">Pick element</button>
      </div>
    </header>

    <div class="wds-tabs-row">
      <nav class="wds-tabs" id="wds-tabs">
        <button class="wds-tab active" data-tab="explorer">Explorer</button>
        <button class="wds-tab" data-tab="preview">Preview</button>
        <button class="wds-tab" data-tab="files">Files</button>
        <button class="wds-tab" data-tab="export">Export</button>
        <button class="wds-tab" data-tab="history">History</button>
      </nav>
      <div class="wds-tabs-search">
        <input
          type="search"
          id="wds-search"
          class="wds-search-input"
          placeholder="Search candidates…"
          aria-label="Search"
        />
      </div>
    </div>

    <main class="wds-main">
      <section id="panel-explorer" class="wds-panel">
        <p class="wds-hint">Candidates detected on the current page.</p>
        <ul id="explorer-list" class="wds-list"></ul>
      </section>

      <section id="panel-preview" class="wds-panel" hidden>
        <div id="preview-stats" class="wds-stats"></div>
        <div class="wds-table-wrap">
          <table id="preview-table" class="wds-table"></table>
        </div>
        <p class="wds-hint">Click a cell to edit it. Use the × buttons to delete a row or column.</p>
        <div class="wds-clean-actions">
          <button class="wds-btn" data-op="trim">Trim whitespace</button>
          <button class="wds-btn" data-op="dedupe-rows">Remove duplicate rows</button>
          <button class="wds-btn" data-op="upper">UPPERCASE</button>
          <button class="wds-btn" data-op="lower">lowercase</button>
          <button class="wds-btn" data-op="title">Title Case</button>
        </div>
      </section>

      <section id="panel-files" class="wds-panel" hidden>
        <p class="wds-hint">Every image, video, audio and file resource found on this page.</p>
        <div id="files-stats" class="wds-stats"></div>
        <div class="wds-files-actions">
          <button id="btn-files-rescan" class="wds-btn">Rescan files</button>
          <button id="btn-files-pick" class="wds-btn">Pick element</button>
          <button id="btn-files-select-all" class="wds-btn">Select all</button>
          <button id="btn-files-select-none" class="wds-btn">Select none</button>
          <button id="btn-files-zip-selected" class="wds-btn wds-btn-primary">Zip selected</button>
          <button id="btn-files-zip-all" class="wds-btn wds-btn-primary">Zip everything</button>
        </div>
        <div id="files-progress" class="wds-hint" hidden></div>
        <div id="files-groups" class="wds-files-groups"></div>
      </section>

      <section id="panel-export" class="wds-panel" hidden>
        <div class="wds-export-grid">
          <button class="wds-btn" data-format="json">JSON</button>
          <button class="wds-btn" data-format="jsonl">JSON Lines</button>
          <button class="wds-btn" data-format="csv">CSV</button>
          <button class="wds-btn" data-format="tsv">TSV</button>
          <button class="wds-btn" data-format="markdown">Markdown</button>
          <button class="wds-btn" data-format="html">HTML</button>
          <button class="wds-btn" data-format="xml">XML</button>
          <button class="wds-btn" data-format="yaml">YAML</button>
          <button class="wds-btn" data-format="sql">SQL</button>
        </div>
        <textarea id="export-preview" class="wds-export-preview" readonly></textarea>
        <div class="wds-export-actions">
          <button id="btn-copy" class="wds-btn wds-btn-primary">Copy</button>
          <button id="btn-download" class="wds-btn wds-btn-primary">Download</button>
        </div>
      </section>

      <section id="panel-history" class="wds-panel" hidden>
        <ul id="history-list" class="wds-list"></ul>
      </section>
    </main>

    <p id="wds-status" class="wds-status"></p>
  </div>
  <img id="wds-file-preview" class="wds-file-preview" alt="" />
  <script src="sidepanel.js"></script>
</body>
</html>
